<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评测机管理台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── Themes ─── */
    :root {
      --bg: #0f0f13;
      --bg2: #1a1a2e;
      --bg3: #16162a;
      --bg4: #0f0f1a;
      --border: #2a2a3e;
      --border2: #3a3a5e;
      --text: #e8e8ef;
      --text2: #b8b8cc;
      --text3: #888;
      --text4: #666;
      --accent: #6c8cff;
      --accent-bg: #6c8cff22;
      --accent-border: #6c8cff33;
      --scrollbar: #2a2a3e;
      --scrollbar2: #3a3a5e;
      --shadow: rgba(0,0,0,0.3);
    }
    [data-theme="light"] {
      --bg: #f0f2f5;
      --bg2: #ffffff;
      --bg3: #f7f8fa;
      --bg4: #f0f2f5;
      --border: #e0e4ea;
      --border2: #c8cdd6;
      --text: #1a1d23;
      --text2: #3a3f4b;
      --text3: #6b7280;
      --text4: #9ca3af;
      --accent: #4f6ef7;
      --accent-bg: #4f6ef712;
      --accent-border: #4f6ef730;
      --scrollbar: #d1d5db;
      --scrollbar2: #9ca3af;
      --shadow: rgba(0,0,0,0.08);
    }
    [data-theme="sunset"] {
      --bg: #1a0a0f;
      --bg2: #2d1520;
      --bg3: #25101a;
      --bg4: #1a0a0f;
      --border: #4a2535;
      --border2: #6a3550;
      --text: #fdeef2;
      --text2: #f0c0cc;
      --text3: #c07080;
      --text4: #8a4055;
      --accent: #ff6b9d;
      --accent-bg: #ff6b9d22;
      --accent-border: #ff6b9d44;
      --scrollbar: #4a2535;
      --scrollbar2: #6a3550;
      --shadow: rgba(0,0,0,0.4);
    }
    [data-theme="forest"] {
      --bg: #0a130d;
      --bg2: #132018;
      --bg3: #0f1a12;
      --bg4: #0a130d;
      --border: #1e3a26;
      --border2: #2e5038;
      --text: #e8f5ec;
      --text2: #a8d4b4;
      --text3: #6a9f78;
      --text4: #3a6648;
      --accent: #4ade80;
      --accent-bg: #4ade8022;
      --accent-border: #4ade8044;
      --scrollbar: #1e3a26;
      --scrollbar2: #2e5038;
      --shadow: rgba(0,0,0,0.4);
    }
    [data-theme="ocean"] {
      --bg: #020d1a;
      --bg2: #061828;
      --bg3: #041220;
      --bg4: #020d1a;
      --border: #0a2a44;
      --border2: #0f3a60;
      --text: #e0f4ff;
      --text2: #90ccee;
      --text3: #4a8aaa;
      --text4: #2a5a70;
      --accent: #38bdf8;
      --accent-bg: #38bdf822;
      --accent-border: #38bdf844;
      --scrollbar: #0a2a44;
      --scrollbar2: #0f3a60;
      --shadow: rgba(0,0,0,0.5);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* Header */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    .header h1 span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* Theme switcher */
    .theme-switcher {
      display: flex;
      gap: 5px;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 8px;
    }
    .theme-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent); }
    .dot-dark    { background: linear-gradient(135deg, #1a1a2e, #6c8cff); }
    .dot-light   { background: linear-gradient(135deg, #f0f2f5, #4f6ef7); }
    .dot-sunset  { background: linear-gradient(135deg, #2d1520, #ff6b9d); }
    .dot-forest  { background: linear-gradient(135deg, #0a130d, #4ade80); }
    .dot-ocean   { background: linear-gradient(135deg, #020d1a, #38bdf8); }

    /* Buttons */
    .btn { padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--text3); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
    .btn-danger { background: #ff4d6d22; color: #ff4d6d; border: 1px solid #ff4d6d44; }
    .btn-danger:hover { background: #ff4d6d33; }
    .btn-warn { background: #ffb86c22; color: #ffb86c; border: 1px solid #ffb86c44; }
    .btn-warn:hover { background: #ffb86c33; }
    .btn-success { background: #50fa7b22; color: #50fa7b; border: 1px solid #50fa7b44; }
    .btn-success:hover { background: #50fa7b33; }
    .btn-info { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
    .btn-info:hover { opacity: 0.8; }

    /* Stats */
    .stats-bar { display: flex; gap: 10px; padding: 16px 24px; overflow-x: auto; }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 18px;
      min-width: 110px;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    .stat-card .label { font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .stat-card .value { font-size: 24px; font-weight: 700; color: var(--text); }
    .stat-card.blue .value { color: var(--accent); }
    .stat-card.green .value { color: #50fa7b; }
    .stat-card.orange .value { color: #ffb86c; }
    .stat-card.red .value { color: #ff4d6d; }

    /* Toolbar */
    .toolbar { padding: 0 24px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .search-box {
      flex: 1; min-width: 160px; max-width: 280px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .filter-btn {
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text3);
      cursor: pointer; font-size: 11px;
      transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Brand sections */
    .brands-container { padding: 0 24px 40px; }
    .brand-section {
      margin-bottom: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    .brand-header {
      padding: 14px 18px;
      display: flex; align-items: center; gap: 10px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .brand-logo {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
    }
    .brand-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .brand-count {
      margin-left: auto;
      background: var(--accent-bg); color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 20px; padding: 2px 10px;
      font-size: 11px; font-weight: 600;
    }
    .brand-toggle { color: var(--text4); font-size: 11px; margin-left: 6px; transition: transform 0.2s; }
    .brand-toggle.collapsed { transform: rotate(-90deg); }

    /* Device cards */
    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px; padding: 14px;
    }
    .device-card {
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      transition: all 0.2s;
      position: relative;
    }
    .device-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
    .device-card.status-in { border-left: 3px solid #50fa7b; }
    .device-card.status-lent { border-left: 3px solid #ffb86c; }
    .device-card.status-returned { border-left: 3px solid #6272a4; }
    .device-card.status-overdue { border-left: 3px solid #ff4d6d; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .device-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .device-model { font-size: 11px; color: var(--text4); margin-top: 2px; }
    .status-badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; flex-shrink: 0; }
    .badge-in { background: #50fa7b22; color: #50fa7b; border: 1px solid #50fa7b44; }
    .badge-lent { background: #ffb86c22; color: #ffb86c; border: 1px solid #ffb86c44; }
    .badge-returned { background: #6272a422; color: #6272a4; border: 1px solid #6272a444; }
    .badge-overdue { background: #ff4d6d22; color: #ff4d6d; border: 1px solid #ff4d6d44; }

    .card-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .meta-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
    .meta-row strong { color: var(--text2); }
    .card-actions { display: flex; gap: 5px; flex-wrap: wrap; }
    .overdue-days { font-size: 11px; color: #ff4d6d; font-weight: 600; margin-top: 3px; }

    /* Empty */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text4); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 24px;
      width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: var(--text); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 11px;
      color: var(--text); font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* Sync status */
    .sync-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text4);
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .sync-status.syncing { color: var(--accent); border-color: var(--accent-border); }
    .sync-status.error { color: #ff4d6d; border-color: #ff4d6d44; }
    .sync-status.ok { color: #50fa7b; border-color: #50fa7b44; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .sync-dot.blink { animation: blink 1s ease-in-out infinite; }

    /* Token setup modal */
    .token-hint { font-size: 11px; color: var(--text4); margin-top: 5px; line-height: 1.6; }
    .token-hint a { color: var(--accent); text-decoration: none; }
    .token-hint a:hover { text-decoration: underline; }

    /* Notification */
    .notification {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px;
      font-size: 13px; color: var(--text);
      z-index: 2000; transform: translateY(80px); opacity: 0;
      transition: all 0.3s; max-width: 300px;
    }
    .notification.show { transform: translateY(0); opacity: 1; }
    .notification.success { border-left: 3px solid #50fa7b; }
    .notification.error { border-left: 3px solid #ff4d6d; }

    /* View toggle */
    .view-toggle { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .view-toggle button { padding: 6px 12px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 11px; transition: all 0.2s; }
    .view-toggle button.active { background: var(--accent); color: #fff; }

    /* Due soon pulse */
    .due-soon { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,184,108,0.3); }
      50% { box-shadow: 0 0 0 5px rgba(255,184,108,0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar2); }

    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .stats-bar { padding: 10px 16px; }
      .toolbar { padding: 0 16px 12px; }
      .brands-container { padding: 0 16px 32px; }
      .devices-grid { grid-template-columns: 1fr; }
      .theme-switcher { display: none; }
    }
  </style>
</head>
<body data-theme="dark">

<div class="header">
  <h1>📱 评测机<span>管理台</span></h1>
  <div class="header-actions">
    <div class="theme-switcher" title="切换主题">
      <div class="theme-dot dot-dark active"    onclick="setTheme('dark')"   title="深空"></div>
      <div class="theme-dot dot-light"          onclick="setTheme('light')"  title="白昼"></div>
      <div class="theme-dot dot-sunset"         onclick="setTheme('sunset')" title="落日"></div>
      <div class="theme-dot dot-forest"         onclick="setTheme('forest')" title="森林"></div>
      <div class="theme-dot dot-ocean"          onclick="setTheme('ocean')"  title="深海"></div>
    </div>
    <div class="sync-status" id="syncStatus" onclick="handleSyncClick()" title="点击配置同步">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">未配置</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="forceRefresh()" title="从服务器重新拉取最新数据">🔄 刷新</button>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">导出</button>
    <button class="btn btn-ghost btn-sm" onclick="importData()">导入</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">＋ 添加</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <input class="search-box" type="text" placeholder="搜索型号、借用人…" oninput="filterDevices(this.value)" />
  <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
  <button class="filter-btn" onclick="setFilter('in', this)">📦 在库</button>
  <button class="filter-btn" onclick="setFilter('lent', this)">📤 借出</button>
  <button class="filter-btn" onclick="setFilter('overdue', this)">🔴 逾期</button>
  <button class="filter-btn" onclick="setFilter('returned', this)">✅ 归还</button>
  <div style="margin-left:auto" class="view-toggle">
    <button class="active" onclick="setView('brand', this)">品牌</button>
    <button onclick="setView('timeline', this)">时间线</button>
  </div>
</div>

<div class="brands-container" id="brandsContainer"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="deviceModal">
  <div class="modal">
    <h2 id="modalTitle">添加设备</h2>
    <div class="form-row">
      <div class="form-group">
        <label>品牌</label>
        <input type="text" id="f-brand" placeholder="Apple / 小米…" list="brandList" />
        <datalist id="brandList"></datalist>
      </div>
      <div class="form-group">
        <label>型号</label>
        <input type="text" id="f-model" placeholder="iPhone 16 Pro" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>颜色 / 规格</label>
        <input type="text" id="f-variant" placeholder="自然钛 / 256GB" />
      </div>
      <div class="form-group">
        <label>到机日期</label>
        <input type="date" id="f-arrivalDate" />
      </div>
    </div>
    <div class="form-group">
      <label>编号 / 序列号（选填）</label>
      <input type="text" id="f-serial" placeholder="SN / IMEI" />
    </div>
    <div class="form-group">
      <label>来源</label>
      <input type="text" id="f-source" placeholder="品牌公关 / 自购…" />
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="f-notes" placeholder="额外说明…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('deviceModal')">取消</button>
      <button class="btn btn-primary" onclick="saveDevice()">保存</button>
    </div>
  </div>
</div>

<!-- Lend Modal -->
<div class="modal-overlay" id="lendModal">
  <div class="modal">
    <h2>借出设备</h2>
    <div class="form-group">
      <label>借用人</label>
      <input type="text" id="l-borrower" placeholder="姓名" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>借出日期</label>
        <input type="date" id="l-lendDate" />
      </div>
      <div class="form-group">
        <label>预计归还日期</label>
        <input type="date" id="l-dueDate" />
      </div>
    </div>
    <div class="form-group">
      <label>用途</label>
      <input type="text" id="l-purpose" placeholder="评测 / 拍摄借用…" />
    </div>
    <div class="form-group">
      <label>联系方式（选填）</label>
      <input type="text" id="l-contact" placeholder="微信 / 电话" />
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="l-notes" placeholder="额外说明…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('lendModal')">取消</button>
      <button class="btn btn-primary" onclick="saveLend()">确认借出</button>
    </div>
  </div>
</div>

<!-- Return Modal -->
<div class="modal-overlay" id="returnModal">
  <div class="modal">
    <h2>确认归还</h2>
    <div class="form-group">
      <label>实际归还日期</label>
      <input type="date" id="r-returnDate" />
    </div>
    <div class="form-group">
      <label>设备状态</label>
      <select id="r-condition">
        <option value="完好">完好</option>
        <option value="轻微磨损">轻微磨损</option>
        <option value="有损坏">有损坏</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="r-notes" placeholder="归还备注…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('returnModal')">取消</button>
      <button class="btn btn-primary" onclick="saveReturn()">确认归还</button>
    </div>
  </div>
</div>


<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal" style="width:540px">
    <h2>借用记录</h2>
    <div id="historyContent" style="max-height:380px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('historyModal')">关闭</button>
    </div>
  </div>
</div>

// ─── Server Sync ─────────────────────────────────────────────────────────────────────────
const API_URL = '/api/devices';

function setSyncUI(state, text) {
  const el = document.getElementById('syncStatus');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  el.className = 'sync-status ' + (state || '');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' blink' : '');
  txt.textContent = text;
}

async function fetchRemote() {
  setSyncUI('syncing', '读取中…');
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const decoded = await res.json();
    setSyncUI('ok', '已同步');
    return decoded;
  } catch(e) {
    setSyncUI('error', '读取失败');
    console.error('fetchRemote', e);
    return null;
  }
}

async function pushRemote(payload) {
  setSyncUI('syncing', '保存中…');
  try {
    const res = await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncUI('ok', '已保存');
    return true;
  } catch(e) {
    setSyncUI('error', '保存失败');
    console.error('pushRemote', e);
    return false;
  }
}

async function forceRefresh() {
  localStorage.removeItem(STORAGE_KEY);
  const remote = await fetchRemote();
  if (remote) {
    data = remote;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    render();
    notify('数据已刷新 ✓', 'success');
  }
}

function handleSyncClick() {
  // 服务器模式不需要配置，点击手动重新拉取
  loadWithRemote();
}

const STORAGE_KEY = 'reviewDevices_v1';
let data = { devices: [], lastUpdated: '' };
let currentFilter = 'all', currentSearch = '', currentView = 'brand';
let editingId = null, lendingId = null, returningId = null;

function load() {
  // 用种子数据初始化（每次都用最新种子，不被旧 localStorage 覆盖）
  try { const e = window.__INITIAL_DATA__; if (e) { data = e; } } catch(e) {}
  // 如果 localStorage 有更新的数据（设备数更多），则用 localStorage
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) {
      const cached = JSON.parse(r);
      if (cached.devices && cached.devices.length >= data.devices.length) {
        data = cached;
      }
    }
  } catch(e) {}
  setSyncUI('', '');
}
async function loadWithRemote() {
  load();
  render(); // 先显本地数据，不让用户等待
  const remote = await fetchRemote();
  if (remote) {
    data = remote;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    render();
  }
}
async function save() {
  data.lastUpdated = new Date().toISOString().slice(0,10);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  await pushRemote(data);
}

// ─── Brand Colors ─────────────────────────────────────────────────────────────
const BRAND_COLORS = {
  'Apple':'#a8a8a8','小米':'#ff6900','Xiaomi':'#ff6900','华为':'#cf1322',
  'OPPO':'#2d6a4f','vivo':'#415fff','三星':'#1428a0','Samsung':'#1428a0',
  '一加':'#f5030d','索尼':'#003087','Sony':'#003087','荣耀':'#c00d0d',
  'Redmi':'#e84343','DJI':'#1a1a1a','魅族':'#ffd000','Google':'#4285f4',
};
function getBrandColor(brand) {
  const b = brand.trim();
  if (BRAND_COLORS[b]) return BRAND_COLORS[b];
  let hash = 0;
  for (let i = 0; i < b.length; i++) hash = b.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash) % 360}, 55%, 55%)`;
}
function getBrandInitial(brand) {
  const b = brand.trim();
  if (!b) return '?';
  if (/[\u4e00-\u9fa5]/.test(b[0])) return b[0];
  return b.slice(0,2).toUpperCase();
}

// ─── Status ───────────────────────────────────────────────────────────────────
function getStatus(d) {
  if (!d.lends || !d.lends.length) return 'in';
  const l = d.lends[d.lends.length-1];
  if (l.returnDate) return 'returned';
  if (l.dueDate && l.dueDate < new Date().toISOString().slice(0,10)) return 'overdue';
  return 'lent';
}
function getStatusLabel(s) { return {in:'在库',lent:'借出中',returned:'已归还',overdue:'已逾期'}[s]||s; }
function getStatusBadge(s) { return {in:'badge-in',lent:'badge-lent',returned:'badge-returned',overdue:'badge-overdue'}[s]||''; }
function getOverdueDays(d) {
  const l = d.lends && d.lends[d.lends.length-1];
  if (!l || l.returnDate || !l.dueDate) return 0;
  const today = new Date().toISOString().slice(0,10);
  return l.dueDate >= today ? 0 : Math.floor((new Date(today)-new Date(l.dueDate))/86400000);
}
function getDueSoonDays(d) {
  const l = d.lends && d.lends[d.lends.length-1];
  if (!l || l.returnDate || !l.dueDate) return null;
  const today = new Date().toISOString().slice(0,10);
  if (l.dueDate < today) return null;
  const diff = (new Date(l.dueDate)-new Date(today))/86400000;
  return diff <= 3 ? Math.ceil(diff) : null;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() { renderStats(); currentView==='brand' ? renderBrandView() : renderTimelineView(); updateBrandDatalist(); }

function filteredDevices() {
  return data.devices.filter(d => {
    const s = getStatus(d);
    if (currentFilter !== 'all' && s !== currentFilter) return false;
    const q = currentSearch.toLowerCase();
    return !q ||
      (d.brand||'').toLowerCase().includes(q) ||
      (d.model||'').toLowerCase().includes(q) ||
      (d.variant||'').toLowerCase().includes(q) ||
      ((d.lends||[]).some(l => (l.borrower||'').toLowerCase().includes(q)));
  });
}

function renderStats() {
  const all = data.devices;
  const t=all.length, i=all.filter(d=>getStatus(d)==='in').length,
        l=all.filter(d=>getStatus(d)==='lent').length,
        o=all.filter(d=>getStatus(d)==='overdue').length,
        r=all.filter(d=>getStatus(d)==='returned').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card blue"><div class="label">总设备</div><div class="value">${t}</div></div>
    <div class="stat-card green"><div class="label">在库</div><div class="value">${i}</div></div>
    <div class="stat-card orange"><div class="label">借出中</div><div class="value">${l}</div></div>
    <div class="stat-card red"><div class="label">逾期</div><div class="value">${o}</div></div>
    <div class="stat-card"><div class="label">已归还</div><div class="value">${r}</div></div>`;
}

function renderBrandView() {
  const devs = filteredDevices();
  const brands = {};
  devs.forEach(d => { const b=d.brand||'未知'; if(!brands[b]) brands[b]=[]; brands[b].push(d); });
  if (!Object.keys(brands).length) {
    document.getElementById('brandsContainer').innerHTML = `<div class="empty-state"><div class="icon">📱</div><p>还没有设备，点右上角「添加」</p></div>`;
    return;
  }
  document.getElementById('brandsContainer').innerHTML = Object.keys(brands).sort().map(brand => {
    const color = getBrandColor(brand), initial = getBrandInitial(brand);
    return `<div class="brand-section">
      <div class="brand-header" onclick="toggleBrand('${encodeURIComponent(brand)}')">
        <div class="brand-logo" style="background:${color}15;color:${color};border:1px solid ${color}30;display:flex;align-items:center;justify-content:center;">${renderBrandIcon(brand, color, initial)}</div>
        <span class="brand-name">${brand}</span>
        <span class="brand-count">${brands[brand].length} 台</span>
        <span class="brand-toggle" id="toggle-${encodeURIComponent(brand)}">▾</span>
      </div>
      <div class="devices-grid" id="grid-${encodeURIComponent(brand)}">
        ${brands[brand].map(renderDeviceCard).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderDeviceCard(d) {
  const status=getStatus(d), od=getOverdueDays(d), ds=getDueSoonDays(d);
  const ll = d.lends && d.lends.length ? d.lends[d.lends.length-1] : null;
  let meta = '';
  if (d.arrivalDate) meta += `<div class="meta-row">📦 到机 <strong>${d.arrivalDate}</strong></div>`;
  if (d.source) meta += `<div class="meta-row">🏢 来源 <strong>${d.source}</strong></div>`;
  if (ll && !ll.returnDate) {
    meta += `<div class="meta-row">👤 借用人 <strong>${ll.borrower}</strong></div>`;
    meta += `<div class="meta-row">📅 借出 <strong>${ll.lendDate}</strong></div>`;
    if (ll.dueDate) meta += `<div class="meta-row">⏰ 预还 <strong>${ll.dueDate}</strong></div>`;
  }
  if (ll && ll.returnDate) {
    meta += `<div class="meta-row">✅ 归还 <strong>${ll.returnDate}</strong></div>`;
    if (ll.borrower) meta += `<div class="meta-row">👤 <strong>${ll.borrower}</strong></div>`;
  }
  let acts = '';
  if (status==='in'||status==='returned') acts += `<button class="btn btn-sm btn-warn" onclick="openLendModal('${d.id}')">借出</button>`;
  if (status==='lent'||status==='overdue') {
    acts += `<button class="btn btn-sm btn-success" onclick="openReturnModal('${d.id}')">归还</button>`;
    acts += `<button class="btn btn-sm btn-warn" onclick="openLendModal('${d.id}')">再借</button>`;
  }
  if (d.lends && d.lends.length) acts += `<button class="btn btn-sm btn-info" onclick="openHistory('${d.id}')">记录(${d.lends.length})</button>`;
  acts += `<button class="btn btn-sm btn-ghost" onclick="openEditModal('${d.id}')">编辑</button>`;
  acts += `<button class="btn btn-sm btn-danger" onclick="deleteDevice('${d.id}')">删除</button>`;
  return `<div class="device-card status-${status}${ds!==null?' due-soon':''}">
    <div class="card-header">
      <div><div class="device-name">${d.model}</div><div class="device-model">${d.variant||''}</div></div>
      <span class="status-badge ${getStatusBadge(status)}">${getStatusLabel(status)}</span>
    </div>
    <div class="card-meta">${meta}</div>
    ${od>0?`<div class="overdue-days">🔴 已逾期 ${od} 天</div>`:''}
    ${ds!==null?`<div class="overdue-days">⚠️ ${ds} 天后到期</div>`:''}
    <div class="card-actions">${acts}</div>
  </div>`;
}

function renderTimelineView() {
  const events = [];
  filteredDevices().forEach(d => {
    (d.lends||[]).forEach(l => {
      events.push({device:d,lend:l,date:l.lendDate});
      if (l.returnDate) events.push({device:d,lend:l,date:l.returnDate,isReturn:true});
    });
    if (!d.lends||!d.lends.length) events.push({device:d,lend:null,date:d.arrivalDate,isArrival:true});
  });
  events.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if (!events.length) { document.getElementById('brandsContainer').innerHTML=`<div class="empty-state"><div class="icon">📅</div><p>没有时间线记录</p></div>`; return; }
  const bc = getComputedStyle(document.body);
  document.getElementById('brandsContainer').innerHTML = `<div style="max-width:600px;margin:0 auto;">
    ${events.map(e=>`<div style="display:flex;gap:14px;margin-bottom:14px;align-items:flex-start;">

        <div style="width:2px;flex:1;background:var(--border);min-height:18px;margin-top:3px"></div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px">${e.device.brand} ${e.device.model}${e.device.variant?' '+e.device.variant:''}</div>
        <div style="font-size:11px;color:var(--text3)">${e.isReturn?`✅ 归还 · ${e.lend.borrower}`:e.isArrival?`📦 到机${e.device.source?' · '+e.device.source:''}`:`📤 借出 · ${e.lend.borrower}${e.lend.dueDate?' · 预还 '+e.lend.dueDate:''}`}</div>
        ${e.lend&&e.lend.purpose?`<div style="font-size:10px;color:var(--text4);margin-top:2px">${e.lend.purpose}</div>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function toggleBrand(enc) {
  const g=document.getElementById('grid-'+enc), t=document.getElementById('toggle-'+enc);
  if (g.style.display==='none') { g.style.display='grid'; t.classList.remove('collapsed'); }
  else { g.style.display='none'; t.classList.add('collapsed'); }
}
function setFilter(f,btn) { currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function filterDevices(q) { currentSearch=q; render(); }
function setView(v,btn) { currentView=v; document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function updateBrandDatalist() {
  document.getElementById('brandList').innerHTML = [...new Set(data.devices.map(d=>d.brand).filter(Boolean))].map(b=>`<option value="${b}">`).join('');
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) closeModal(o.id); }));

function openAddModal() {
  editingId=null; document.getElementById('modalTitle').textContent='添加设备';
  ['brand','model','variant','serial','source','notes'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-arrivalDate').value=new Date().toISOString().slice(0,10);
  openModal('deviceModal');
}
function openEditModal(id) {
  const d=data.devices.find(x=>x.id===id); if(!d) return;
  editingId=id; document.getElementById('modalTitle').textContent='编辑设备';
  ['brand','model','variant','serial','source','notes'].forEach(f=>document.getElementById('f-'+f).value=d[f]||'');
  document.getElementById('f-arrivalDate').value=d.arrivalDate||'';
  openModal('deviceModal');
}
async function saveDevice() {
  const brand=document.getElementById('f-brand').value.trim(), model=document.getElementById('f-model').value.trim();
  if (!model) { notify('型号不能为空','error'); return; }
  const fields = {brand,model,variant:document.getElementById('f-variant').value.trim(),arrivalDate:document.getElementById('f-arrivalDate').value,serial:document.getElementById('f-serial').value.trim(),source:document.getElementById('f-source').value.trim(),notes:document.getElementById('f-notes').value.trim()};
  if (editingId) { Object.assign(data.devices.find(x=>x.id===editingId), fields); }
  else { data.devices.push({id:uid(),...fields,lends:[],createdAt:new Date().toISOString()}); }
  closeModal('deviceModal'); render();
  await save();
  notify(editingId?'设备信息已更新':'设备已添加 ✓','success');
}
function openLendModal(id) {
  lendingId=id;
  ['borrower','purpose','contact','notes'].forEach(f=>document.getElementById('l-'+f).value='');
  document.getElementById('l-lendDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('l-dueDate').value='';
  openModal('lendModal');
}
async function saveLend() {
  const borrower=document.getElementById('l-borrower').value.trim();
  if (!borrower) { notify('借用人不能为空','error'); return; }
  const d=data.devices.find(x=>x.id===lendingId); if(!d) return;
  if (!d.lends) d.lends=[];
  d.lends.push({id:uid(),borrower,lendDate:document.getElementById('l-lendDate').value,dueDate:document.getElementById('l-dueDate').value,purpose:document.getElementById('l-purpose').value.trim(),contact:document.getElementById('l-contact').value.trim(),notes:document.getElementById('l-notes').value.trim(),returnDate:null});
  closeModal('lendModal'); render();
  await save();
  notify(`已借出给 ${borrower} ✓`,'success');
}
function openReturnModal(id) {
  returningId=id;
  document.getElementById('r-returnDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('r-condition').value='完好';
  document.getElementById('r-notes').value='';
  openModal('returnModal');
}
async function saveReturn() {
  const d=data.devices.find(x=>x.id===returningId); if(!d) return;
  const l=d.lends&&d.lends[d.lends.length-1];
  if (!l||l.returnDate) { notify('没有未归还的借出记录','error'); return; }
  l.returnDate=document.getElementById('r-returnDate').value;
  l.condition=document.getElementById('r-condition').value;
  l.returnNotes=document.getElementById('r-notes').value.trim();
  closeModal('returnModal'); render();
  await save();
  notify('归还记录已保存 ✓','success');
}
function openHistory(id) {
  const d=data.devices.find(x=>x.id===id); if(!d) return;
  const lends=d.lends||[];
  document.getElementById('historyContent').innerHTML = `<div style="font-size:12px;color:var(--text4);margin-bottom:10px">${d.brand} ${d.model} — 共 ${lends.length} 条记录</div>`+(lends.length===0?'<p style="color:var(--text4);text-align:center;padding:20px">暂无记录</p>':lends.slice().reverse().map(l=>`<div style="background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:700;color:var(--text)">${l.borrower}</span><span style="font-size:11px;color:${l.returnDate?'#50fa7b':'#ffb86c'}">${l.returnDate?'已归还':'借出中'}</span></div><div style="font-size:11px;color:var(--text3);line-height:1.9">📤 借出：${l.lendDate}${l.dueDate?' ⏰ 预还：'+l.dueDate:''}${l.returnDate?`<br>✅ 归还：${l.returnDate}${l.condition?' ('+l.condition+')':''}`:''}${l.purpose?`<br>📌 ${l.purpose}`:''}${l.contact?`<br>📞 ${l.contact}`:''}${l.notes?`<br>📝 ${l.notes}`:''}${l.returnNotes?`<br>📝 归还备注：${l.returnNotes}`:''}</div></div>`).join(''));
  openModal('historyModal');
}
async function deleteDevice(id) {
  const d=data.devices.find(x=>x.id===id); if(!d) return;
  if (!confirm(`确认删除「${d.brand} ${d.model}」？`)) return;
  data.devices=data.devices.filter(x=>x.id!==id);
  render();
  await save();
  notify('设备已删除','error');
}
function exportData() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`devices-${new Date().toISOString().slice(0,10)}.json`; a.click();
  notify('数据已导出 ✓','success');
}
function importData() {
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const fr=new FileReader();
    fr.onload=ev=>{ try { const d=JSON.parse(ev.target.result); if(!d.devices) throw 0; if(!confirm(`导入 ${d.devices.length} 台设备？将覆盖现有数据。`)) return; data=d; save(); render(); notify(`导入成功：${d.devices.length} 台`,'success'); } catch(e){ notify('导入失败','error'); } };
    fr.readAsText(e.target.files[0]);
  };
  input.click();
}
function notify(msg,type='success') {
  const el=document.getElementById('notification');
  el.textContent=msg; el.className=`notification ${type} show`;
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

loadWithRemote();
</script>
</body>
</html>
